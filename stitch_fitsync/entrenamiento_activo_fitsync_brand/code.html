<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #0d0f0d;
      color: #e3e2df;
    }
    .accent-border-left {
      border-left: 4px solid #00a1d8;
    }
    .progress-gradient {
      background: linear-gradient(to right, #0a2e6e, #00a1d8);
    }
    .inner-shadow-recessed {
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface-container-lowest flex items-center justify-between px-margin-mobile h-14 w-full fixed top-0 z-50">
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-secondary-container" data-icon="sync">sync</span>
<h1 class="font-headline-sm text-headline-sm font-bold text-secondary-container">FitSync</h1>
</div>
<button class="transition-opacity duration-200 hover:opacity-80">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
</header>
<!-- Content Canvas -->
<main class="flex-grow pt-20 pb-32 px-margin-mobile max-w-container-max mx-auto w-full">
<!-- Exercise Header -->
<section class="mb-8">
<div class="flex items-baseline justify-between mb-2">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Peso Muerto</h2>
<span class="font-label-md text-label-md bg-secondary-container/10 text-secondary-container px-3 py-1 rounded-full border border-secondary-container/20">SERIE 2/4</span>
</div>
<div class="accent-border-left bg-surface-container p-4 rounded-lg flex items-center justify-between">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Historial Anterior</span>
<p class="font-body-md text-body-md text-secondary-container font-semibold">Serie 1: 100kg x 5 ✓</p>
</div>
<button class="border border-secondary-container text-secondary-container font-label-md text-label-md px-4 py-2 rounded-lg transition-transform active:scale-95">
          Repetir carga
        </button>
</div>
</section>
<!-- Controls Bento Grid -->
<div class="grid grid-cols-1 gap-gutter mb-8">
<!-- Carga Stepper -->
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10">
<label class="font-label-md text-label-md text-on-surface-variant block mb-4 uppercase tracking-widest text-center">CARGA (KG)</label>
<div class="flex items-center justify-between">
<button class="w-14 h-14 rounded-lg bg-surface-container-highest flex items-center justify-center text-secondary-container transition-transform active:scale-90">
<span class="material-symbols-outlined text-3xl" data-icon="remove">remove</span>
</button>
<div class="text-center">
<span class="font-headline-xl text-headline-xl text-on-surface">102.5</span>
</div>
<button class="w-14 h-14 rounded-lg bg-secondary-container flex items-center justify-center text-on-secondary-container transition-transform active:scale-90">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Repeticiones Stepper -->
<div class="bg-surface-container-low p-6 rounded-xl border border-outline-variant/10">
<label class="font-label-md text-label-md text-on-surface-variant block mb-4 uppercase tracking-widest text-center">REPETICIONES</label>
<div class="flex items-center justify-between">
<button class="w-14 h-14 rounded-lg bg-surface-container-highest flex items-center justify-center text-secondary-container transition-transform active:scale-90">
<span class="material-symbols-outlined text-3xl" data-icon="remove">remove</span>
</button>
<div class="text-center">
<span class="font-headline-xl text-headline-xl text-on-surface">5</span>
</div>
<button class="w-14 h-14 rounded-lg bg-secondary-container flex items-center justify-center text-on-secondary-container transition-transform active:scale-90">
<span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
</button>
</div>
</div>
</div>
<!-- Timer & Progress -->
<section class="flex flex-col items-center justify-center py-6">
<div class="relative w-40 h-40 flex items-center justify-center mb-4">
<!-- SVG Ring -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90">
<circle class="text-surface-container-highest" cx="80" cy="80" fill="transparent" r="70" stroke="currentColor" stroke-width="8"></circle>
<circle class="text-secondary-container" cx="80" cy="80" fill="transparent" r="70" stroke="currentColor" stroke-dasharray="440" stroke-dashoffset="110" stroke-width="8"></circle>
</svg>
<div class="text-center">
<span class="font-headline-md text-headline-md text-on-surface block">01:30</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Descanso</span>
</div>
</div>
<!-- Visual Reinforcement (Contextual Image) -->
<div class="w-full h-48 rounded-xl overflow-hidden relative group">
<img alt="Fitness Motivation" class="w-full h-full object-cover grayscale opacity-40 group-hover:grayscale-0 transition-all duration-700" data-alt="A cinematic, high-contrast close-up of a muscular athlete's hands gripping a heavy steel barbell with chalk dust in the air. The lighting is dramatic and moody with deep shadows and sharp cyan highlights, emphasizing the metallic texture and physical effort. The scene is set in a premium, dark-first industrial gym with a minimalist corporate aesthetic and clean lines. Professional fitness photography with a shallow depth of field." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBvNVUyPd7CzQ2FVk8se1-wWmeT6kL5OsKiW4nbqgMqiAhoRzGRL_hkbVeVqEmPH2W2qVyqX_XuyeXsZhbHiYGJBLmq2HcL4v_oAeyOdqGOYxa--WaOMx9GDj_Iq7DDfGp7y2tYxZA93zCvK65rgevifDZx9RM-utcqzKZzRmVNc41-qnXtXc9PmKNAMtPhinsECvT1ZqH0RxsUrq6X1rH9njWJvBHldx2HE0TCFyv3yOkIBgvzIDCxJMpCiqy3ms03DUkXoTgyVtT3">
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
<div class="absolute bottom-4 left-4">
<p class="font-label-md text-label-md text-secondary-container flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="trending_up">trending_up</span>
            ESTÁS AL 95% DE TU RÉCORD PERSONAL
          </p>
</div>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 w-full z-50 p-margin-mobile bg-surface-container/80 backdrop-blur-md">
<button class="w-full h-16 bg-primary-container text-white rounded-lg flex items-center justify-center gap-3 transition-transform active:scale-[0.98] shadow-lg">
<span class="material-symbols-outlined text-2xl" data-icon="vibration">vibration</span>
<span class="font-headline-sm text-headline-sm uppercase tracking-wider">Guardar Serie</span>
</button>
</footer>
</body></html>
